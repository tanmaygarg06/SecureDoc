<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Files · SecureDocs</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar" id="topbar-root"></div>

    <div class="main">
      <div class="page-header">
        <div>
          <h2>My Files</h2>
          <p>Upload, organize, and manage your documents in S3</p>
        </div>
        <div class="actions">
          <button class="btn btn-outline" id="new-folder-btn">+ New Folder</button>
          <button class="btn btn-primary" id="upload-btn">⬆ Upload File</button>
          <input type="file" id="file-input" style="display:none" />
        </div>
      </div>

      <div class="stat-strip" id="stat-strip"></div>

      <div class="breakdown-card" id="breakdown-card" style="display:none;"></div>

      <div class="recent-strip" id="recent-strip" style="display:none;">
        <div class="title">Recently viewed</div>
        <div class="recent-row" id="recent-row"></div>
      </div>

      <div class="toolbar-row">
        <div class="breadcrumb" id="breadcrumb" style="margin-bottom:0;"></div>
        <div class="search-box" id="search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Filter this folder…" />
          <span class="kbd-hint">/</span>
        </div>
        <div class="view-toggle" id="view-toggle">
          <button type="button" id="view-list-btn" class="active" title="List view"></button>
          <button type="button" id="view-grid-btn" title="Grid view"></button>
        </div>
      </div>

      <div class="bulk-bar" id="bulk-bar" style="display:none;">
        <span class="count"><span class="n" id="bulk-count">0</span> selected</span>
        <button class="btn btn-outline btn-sm" id="bulk-download-btn">⬇ Download</button>
        <button class="btn btn-danger btn-sm" id="bulk-delete-btn">Delete</button>
        <button class="btn btn-outline btn-sm" id="bulk-clear-btn">Clear</button>
      </div>

      <div class="card" id="table-card">
        <table id="file-table">
          <thead>
            <tr>
              <th class="chk-col"><input type="checkbox" class="chk" id="select-all-chk" title="Select all" /></th>
              <th class="sortable" data-sort="name">Name <span class="sort-arrow" id="arrow-name"></span></th>
              <th class="sortable" data-sort="size">Size <span class="sort-arrow" id="arrow-size"></span></th>
              <th class="sortable" data-sort="lastModified">Last Modified <span class="sort-arrow" id="arrow-lastModified"></span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="file-list">
            <tr><td colspan="5"><div class="spinner-wrap"><span class="loading-spinner spinner-dark"></span></div></td></tr>
          </tbody>
        </table>
        <div class="file-grid" id="file-grid" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div class="upload-tray" id="upload-tray"></div>

  <!-- New folder modal -->
  <div class="modal-overlay" id="folder-modal">
    <div class="modal">
      <h3>Create new folder</h3>
      <div class="field">
        <label for="folder-name">Folder name</label>
        <input type="text" id="folder-name" placeholder="e.g. Invoices" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="folder-cancel">Cancel</button>
        <button class="btn btn-primary" id="folder-create">Create</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete item?</h3>
      <p id="delete-message" style="color:var(--text-muted); font-size:14px;"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
